<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Start Page</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        .clock {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #8f90a6;
        }
        .search-container {
            margin-bottom: 3rem;
            width: 100%;
        }
        .search-box {
            width: 100%;
            background-color: #1c1c1e;
            border: 2px solid #2c2c2e;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 1.1rem;
            color: #ffffff;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }
        .search-box:focus {
            border-color: #007acc;
        }
        .shortcuts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
        }
        .shortcut-card {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            padding: 1.2rem;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background-color 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .shortcut-card:hover {
            background-color: #2c2c2e;
            border-color: #007acc;
        }
        .shortcut-card .icon {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .badge {
            margin-top: 2rem;
            display: inline-block;
            background-color: #007acc;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.incognito {
            background-color: #6a1b9a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock" id="clock">00:00:00</div>
        
        <div class="search-container">
            <form action="https://duckduckgo.com/" method="get" id="search-form">
                <input type="text" name="q" class="search-box" placeholder="Search privately with DuckDuckGo..." autofocus autocomplete="off">
            </form>
        </div>
        
        <div class="shortcuts">
            <a href="https://duckduckgo.com" class="shortcut-card">
                <div class="icon">🦆</div>
                <div>DuckDuckGo</div>
            </a>
            <a href="https://wikipedia.org" class="shortcut-card">
                <div class="icon">📖</div>
                <div>Wikipedia</div>
            </a>
            <a href="https://github.com" class="shortcut-card">
                <div class="icon">💻</div>
                <div>GitHub</div>
            </a>
            <a href="https://youtube.com" class="shortcut-card">
                <div class="icon">📺</div>
                <div>YouTube</div>
            </a>
        </div>
        
        <div id="mode-badge" class="badge">Standard Mode</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'incognito') {
            const badge = document.getElementById('mode-badge');
            badge.textContent = 'Private Mode';
            badge.className = 'badge incognito';
            document.querySelector('.search-box').placeholder = 'Search privately in Incognito Mode...';
        }
    </script>
</body>
</html>

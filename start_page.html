<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.55);
            --text-tertiary: rgba(255,255,255,0.22);
            --accent: #ffffff;
            --accent-muted: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.14);
            --input-bg: #0a0a0a;
        }

        body.theme-light {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --text: #000000;
            --text-secondary: rgba(0,0,0,0.50);
            --text-tertiary: rgba(0,0,0,0.20);
            --accent: #000000;
            --accent-muted: rgba(0,0,0,0.05);
            --border: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.14);
            --input-bg: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 90%;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .wordmark {
            font-size: clamp(3rem, 7vw, 4.5rem);
            font-weight: 100;
            letter-spacing: 0.06em;
            color: var(--text);
            margin-bottom: 0.3rem;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1;
        }

        .wordmark-sub {
            display: block;
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            color: var(--text-tertiary);
            margin-bottom: 3.5rem;
            font-weight: 400;
            text-transform: uppercase;
        }

        .search-wrap {
            position: relative;
            max-width: 440px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            pointer-events: none;
            opacity: 0.35;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 13px 48px;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            text-align: left;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            font-family: inherit;
            font-weight: 400;
        }

        input:focus {
            border-color: var(--border-hover);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        input::placeholder {
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .hint {
            font-size: 0.58rem;
            color: var(--text-tertiary);
            margin-top: 1.2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .engines {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            margin-top: 2.8rem;
            flex-wrap: wrap;
        }

        .engine {
            padding: 5px 13px;
            border-radius: 999px;
            font-size: 0.68rem;
            color: var(--text-secondary);
            background: transparent;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .engine:hover {
            color: var(--text);
            border-color: var(--border-hover);
        }

        .engine.active {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-muted);
        }
    </style>
</head>
<body class="theme-dark">
    <div class="container">
        <div class="wordmark">veil</div>
        <div class="wordmark-sub">private browser</div>
        <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <form action="https://duckduckgo.com/" method="get" id="search-form">
                <input type="text" name="q" id="search-input" placeholder="Search the web" autofocus autocomplete="off" spellcheck="false">
            </form>
        </div>
        <div class="hint">press enter</div>
        <div class="engines" id="engines"></div>
    </div>

    <script>
        var THEME = (function() {
            var m = location.search.match(/theme=([^&]+)/);
            return m ? m[1] : 'void';
        })();

        if (THEME.indexOf('light') !== -1) {
            document.body.classList.add('theme-light');
        } else {
            document.body.classList.add('theme-dark');
        }

        var ENGINES = {
            "DuckDuckGo":  { url: "https://duckduckgo.com/?q=",        label: "DuckDuckGo" },
            "Brave Search": { url: "https://search.brave.com/search?q=", label: "Brave" },
            "Startpage":   { url: "https://www.startpage.com/sp/search?query=", label: "Startpage" },
            "SearXNG":     { url: "https://searx.be/search?q=",           label: "SearXNG" }
        };

        function loadSavedEngine() {
            try {
                if (window.name) {
                    var m = window.name.match(/^veil_engine=([^|]+)\|(.+)$/);
                    if (m && ENGINES[m[1]] && ENGINES[m[1]].url === m[2]) {
                        return { name: m[1], url: m[2] };
                    }
                }
            } catch (e) {}
            return null;
        }

        function saveEngine(name, url) {
            try { window.name = 'veil_engine=' + name + '|' + url; } catch (e) {}
        }

        function applyEngine(name, url) {
            document.getElementById('search-form').action = url;
            var buttons = document.querySelectorAll('.engine');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.toggle('active', buttons[i].dataset.name === name);
            }
        }

        var enginesEl = document.getElementById('engines');
        var saved = loadSavedEngine();
        var currentName = saved ? saved.name : 'DuckDuckGo';
        var currentUrl = saved ? saved.url : ENGINES[currentName].url;

        for (var name in ENGINES) {
            (function(n, info) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'engine' + (n === currentName ? ' active' : '');
                btn.dataset.name = n;
                btn.textContent = info.label;
                btn.addEventListener('click', function() {
                    saveEngine(n, info.url);
                    applyEngine(n, info.url);
                    window.location.hash = 'engine=' + encodeURIComponent(n) + '|' + encodeURIComponent(info.url);
                });
                enginesEl.appendChild(btn);
            })(name, ENGINES[name]);
        }

        applyEngine(currentName, currentUrl);
    </script>
</body>
</html>
